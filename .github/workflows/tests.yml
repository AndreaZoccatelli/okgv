name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # "dev": minimal install — proves the no-extras path + graceful degradation.
        # "dev,tui": full install — actually runs textual-dependent tests.
        extras: ["dev", "dev,tui"]
    name: test (${{ matrix.extras }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"

      - name: Lint and format check
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit tests
        run: pytest tests/unit -v

      - name: Run integration tests
        run: pytest tests/integration -v
